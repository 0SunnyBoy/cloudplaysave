<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudPlayGames - Plataforma de Jogos</title>
  <meta name="description" content="CloudPlayGames - A melhor plataforma de jogos digitais" />
  <meta name="theme-color" content="#0d0d1a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #08080f;
      --bg-dark:    #0d0d1a;
      --bg-card:    #12121f;
      --bg-card2:   #1a1a2e;
      --accent:     #00e5ff;
      --accent2:    #7b2fff;
      --accent3:    #ff2d78;
      --gold:       #ffd700;
      --text:       #e8e8f0;
      --text-muted: #7a7a9a;
      --border:     rgba(0,229,255,0.15);
      --border2:    rgba(123,47,255,0.25);
      --glow:       0 0 20px rgba(0,229,255,0.3);
      --glow2:      0 0 20px rgba(123,47,255,0.4);
      --font-display: 'Orbitron', monospace;
      --font-body:    'Rajdhani', sans-serif;
    }

    html, body { height: 100%; font-family: var(--font-body); background: var(--bg-deep); color: var(--text); font-size: 16px; overflow-x: hidden; }

    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 3px; }

    /* NAVBAR */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 64px;
      background: rgba(8,8,15,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-logo {
      font-family: var(--font-display); font-size: 1.3rem; font-weight: 900;
      color: var(--accent); letter-spacing: 2px; cursor: pointer;
      text-shadow: 0 0 12px rgba(0,229,255,0.6);
    }
    .nav-logo span { color: var(--accent2); }
    .nav-links { display: flex; gap: 0.25rem; align-items: center; }
    .nav-link {
      padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer;
      font-family: var(--font-body); font-weight: 600; font-size: 0.9rem;
      color: var(--text-muted); letter-spacing: 0.5px;
      transition: all 0.2s; border: none; background: none;
      text-transform: uppercase;
    }
    .nav-link:hover, .nav-link.active { color: var(--accent); background: rgba(0,229,255,0.08); }
    .nav-actions { display: flex; gap: 0.75rem; align-items: center; }
    .cart-btn {
      position: relative; cursor: pointer; padding: 0.4rem;
      color: var(--text-muted); font-size: 1.4rem;
      background: none; border: none; transition: color 0.2s;
    }
    .cart-btn:hover { color: var(--accent); }
    .cart-badge {
      position: absolute; top: -4px; right: -4px;
      background: var(--accent3); color: #fff;
      font-size: 0.65rem; font-weight: 700; font-family: var(--font-display);
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-primary {
      padding: 0.45rem 1.2rem; border-radius: 6px; cursor: pointer;
      font-family: var(--font-display); font-size: 0.75rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: var(--bg-deep); border: none;
      transition: all 0.2s; box-shadow: 0 0 14px rgba(0,229,255,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,229,255,0.5); }
    .btn-primary:active { transform: translateY(0); }
    .btn-outline {
      padding: 0.45rem 1.2rem; border-radius: 6px; cursor: pointer;
      font-family: var(--font-display); font-size: 0.75rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      background: transparent; color: var(--accent);
      border: 1px solid var(--accent); transition: all 0.2s;
    }
    .btn-outline:hover { background: rgba(0,229,255,0.1); box-shadow: var(--glow); }

    /* MAIN CONTENT */
    .main { margin-top: 64px; flex: 1; }
    .page { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* HERO */
    .hero {
      position: relative; min-height: 88vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; text-align: center; padding: 4rem 2rem;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(123,47,255,0.25) 0%, transparent 70%),
                  radial-gradient(ellipse 60% 40% at 80% 20%, rgba(0,229,255,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse 40% 50% at 20% 80%, rgba(255,45,120,0.1) 0%, transparent 60%),
                  var(--bg-deep);
    }
    .hero-grid {
      position: absolute; inset: 0; opacity: 0.07;
      background-image: linear-gradient(rgba(0,229,255,0.5) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,229,255,0.5) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-content { position: relative; z-index: 1; max-width: 800px; }
    .hero-badge {
      display: inline-block; margin-bottom: 1.5rem;
      padding: 0.3rem 1rem; border-radius: 20px;
      border: 1px solid rgba(0,229,255,0.4); font-size: 0.8rem;
      font-family: var(--font-display); letter-spacing: 2px;
      color: var(--accent); background: rgba(0,229,255,0.08);
    }
    .hero h1 {
      font-family: var(--font-display); font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900; line-height: 1.05; margin-bottom: 1.5rem;
      letter-spacing: -1px;
    }
    .hero h1 .line1 { color: var(--text); }
    .hero h1 .line2 {
      display: block;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 1.2rem; color: var(--text-muted); max-width: 550px;
      margin: 0 auto 2.5rem; line-height: 1.6; font-weight: 400;
    }
    .hero-cta { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn-hero {
      padding: 0.85rem 2.5rem; border-radius: 8px; cursor: pointer;
      font-family: var(--font-display); font-size: 0.85rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; border: none;
      background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
      color: var(--bg-deep);
      transition: all 0.25s; box-shadow: 0 0 30px rgba(0,229,255,0.35);
    }
    .btn-hero:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(0,229,255,0.5); }
    .btn-hero-outline {
      padding: 0.85rem 2.5rem; border-radius: 8px; cursor: pointer;
      font-family: var(--font-display); font-size: 0.85rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      background: transparent; color: var(--text);
      border: 1px solid rgba(255,255,255,0.2); transition: all 0.25s;
    }
    .btn-hero-outline:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.07); }

    /* STATS BAR */
    .stats-bar {
      background: var(--bg-card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem; display: flex; justify-content: center; gap: 4rem; flex-wrap: wrap;
    }
    .stat-item { text-align: center; }
    .stat-num { font-family: var(--font-display); font-size: 1.6rem; font-weight: 900; color: var(--accent); }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

    /* SECTION */
    .section { padding: 4rem 2rem; max-width: 1200px; margin: 0 auto; }
    .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 2rem; }
    .section-title {
      font-family: var(--font-display); font-size: 1.4rem; font-weight: 700;
      color: var(--text); letter-spacing: 1px;
    }
    .section-title span { color: var(--accent); }
    .see-all { font-size: 0.85rem; color: var(--accent); cursor: pointer; font-weight: 600; letter-spacing: 0.5px; }
    .see-all:hover { text-decoration: underline; }

    /* GAME CARDS */
    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.25rem; }
    .game-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: all 0.25s; position: relative;
    }
    .game-card:hover {
      transform: translateY(-4px); border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(0,229,255,0.2);
    }
    .game-thumb {
      width: 100%; aspect-ratio: 3/4; position: relative; overflow: hidden;
    }
    .game-thumb-img {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 4rem; transition: transform 0.3s;
    }
    .game-card:hover .game-thumb-img { transform: scale(1.05); }
    .game-badge {
      position: absolute; top: 8px; left: 8px;
      padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.7rem;
      font-family: var(--font-display); font-weight: 700; letter-spacing: 0.5px;
    }
    .badge-new { background: var(--accent3); color: #fff; }
    .badge-sale { background: var(--gold); color: var(--bg-deep); }
    .badge-hot { background: #ff6b00; color: #fff; }
    .wishlist-btn {
      position: absolute; top: 8px; right: 8px;
      width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer;
      background: rgba(0,0,0,0.6); color: var(--text-muted); font-size: 1rem;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .wishlist-btn.active { color: var(--accent3); }
    .wishlist-btn:hover { background: rgba(0,0,0,0.85); }
    .game-info { padding: 0.85rem; }
    .game-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.25rem; }
    .game-genre { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .game-footer { display: flex; align-items: center; justify-content: space-between; }
    .game-price { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; color: var(--accent); }
    .game-price-old { font-size: 0.78rem; color: var(--text-muted); text-decoration: line-through; }
    .game-rating { font-size: 0.8rem; color: var(--gold); }
    .btn-add {
      padding: 0.3rem 0.7rem; border-radius: 5px; cursor: pointer; font-size: 0.75rem;
      font-family: var(--font-display); font-weight: 700; letter-spacing: 0.5px;
      background: rgba(0,229,255,0.12); color: var(--accent); border: 1px solid rgba(0,229,255,0.3);
      transition: all 0.2s;
    }
    .btn-add:hover { background: rgba(0,229,255,0.25); box-shadow: 0 0 10px rgba(0,229,255,0.3); }

    /* FEATURED BANNER */
    .featured-banner {
      margin: 2rem 0; border-radius: 16px; overflow: hidden;
      background: linear-gradient(135deg, #1a0a2e, #0a1a2e);
      border: 1px solid var(--border2); position: relative; padding: 3rem 2.5rem;
    }
    .featured-banner::before {
      content: ''; position: absolute; inset: 0; opacity: 0.5;
      background: radial-gradient(ellipse at 70% 50%, rgba(123,47,255,0.4), transparent 60%);
    }
    .featured-content { position: relative; z-index: 1; max-width: 500px; }
    .featured-tag {
      display: inline-block; margin-bottom: 1rem;
      padding: 0.2rem 0.8rem; border-radius: 4px; font-size: 0.72rem;
      font-family: var(--font-display); letter-spacing: 1.5px; text-transform: uppercase;
      background: var(--accent2); color: #fff;
    }
    .featured-title {
      font-family: var(--font-display); font-size: 2.2rem; font-weight: 900;
      color: var(--text); margin-bottom: 0.75rem; line-height: 1.1;
    }
    .featured-desc { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 1rem; line-height: 1.5; }
    .featured-price { font-family: var(--font-display); font-size: 2rem; font-weight: 900; color: var(--accent); margin-bottom: 1.5rem; }
    .featured-emoji { position: absolute; right: 2.5rem; top: 50%; transform: translateY(-50%); font-size: 8rem; opacity: 0.6; }

    /* CATEGORIES */
    .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
    .cat-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1.25rem 1rem; text-align: center; cursor: pointer;
      transition: all 0.2s;
    }
    .cat-card:hover { border-color: var(--accent2); background: var(--bg-card2); transform: translateY(-2px); }
    .cat-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .cat-name { font-weight: 600; font-size: 0.9rem; }
    .cat-count { font-size: 0.75rem; color: var(--text-muted); }

    /* LOGIN PAGE */
    .auth-page {
      min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(123,47,255,0.18) 0%, transparent 70%), var(--bg-deep);
      padding: 2rem;
    }
    .auth-card {
      background: var(--bg-card); border: 1px solid var(--border2); border-radius: 16px;
      padding: 2.5rem 2rem; width: 100%; max-width: 420px;
      box-shadow: 0 0 60px rgba(123,47,255,0.15);
    }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo-text {
      font-family: var(--font-display); font-size: 1.8rem; font-weight: 900;
      color: var(--accent); letter-spacing: 3px; text-shadow: 0 0 20px rgba(0,229,255,0.5);
    }
    .auth-logo-text span { color: var(--accent2); }
    .auth-subtitle { font-size: 0.9rem; color: var(--text-muted); text-align: center; margin-bottom: 2rem; }
    .auth-tabs { display: flex; margin-bottom: 1.75rem; border-radius: 8px; background: var(--bg-dark); padding: 4px; }
    .auth-tab {
      flex: 1; padding: 0.55rem; border-radius: 6px; text-align: center; cursor: pointer;
      font-family: var(--font-display); font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;
      color: var(--text-muted); border: none; background: none; transition: all 0.2s;
    }
    .auth-tab.active { background: var(--bg-card2); color: var(--accent); }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.4rem; letter-spacing: 0.5px; font-weight: 600; }
    .form-input {
      width: 100%; padding: 0.7rem 1rem; border-radius: 8px;
      background: var(--bg-dark); border: 1px solid var(--border); color: var(--text);
      font-family: var(--font-body); font-size: 0.95rem; transition: border-color 0.2s;
      outline: none;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,229,255,0.1); }
    .form-input::placeholder { color: var(--text-muted); }
    .btn-full {
      width: 100%; padding: 0.85rem; border-radius: 8px; cursor: pointer;
      font-family: var(--font-display); font-size: 0.82rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; border: none;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: var(--bg-deep); margin-top: 0.5rem; transition: all 0.2s;
      box-shadow: 0 0 20px rgba(0,229,255,0.25);
    }
    .btn-full:hover { box-shadow: 0 4px 30px rgba(0,229,255,0.5); transform: translateY(-1px); }
    .auth-divider { text-align: center; color: var(--text-muted); font-size: 0.82rem; margin: 1.25rem 0; }
    .social-btn {
      width: 100%; padding: 0.7rem; border-radius: 8px; cursor: pointer; margin-bottom: 0.6rem;
      background: var(--bg-dark); border: 1px solid var(--border); color: var(--text);
      font-family: var(--font-body); font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
    }
    .social-btn:hover { border-color: var(--accent); }
    .forgot-link { text-align: right; font-size: 0.8rem; color: var(--accent); cursor: pointer; margin-top: 0.3rem; }

    /* COMPRAR PAGE */
    .store-header {
      background: linear-gradient(180deg, rgba(123,47,255,0.15), transparent);
      padding: 3rem 2rem 2rem; text-align: center; border-bottom: 1px solid var(--border);
    }
    .store-title { font-family: var(--font-display); font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
    .store-subtitle { color: var(--text-muted); }
    .store-filters {
      display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
      padding: 1.25rem 2rem; background: var(--bg-card); border-bottom: 1px solid var(--border);
      max-width: 1200px; margin: 0 auto;
    }
    .filter-btn {
      padding: 0.4rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.82rem;
      font-weight: 600; font-family: var(--font-body); letter-spacing: 0.3px;
      background: var(--bg-dark); color: var(--text-muted); border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .filter-btn.active { background: rgba(0,229,255,0.12); color: var(--accent); border-color: rgba(0,229,255,0.4); }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .search-bar {
      flex: 1; max-width: 280px; padding: 0.4rem 1rem; border-radius: 20px;
      background: var(--bg-dark); border: 1px solid var(--border); color: var(--text);
      font-family: var(--font-body); font-size: 0.88rem; outline: none;
    }
    .search-bar:focus { border-color: var(--accent); }
    .search-bar::placeholder { color: var(--text-muted); }

    /* WISHLIST */
    .wishlist-empty { text-align: center; padding: 5rem 2rem; }
    .wishlist-empty-icon { font-size: 5rem; margin-bottom: 1.5rem; opacity: 0.4; }
    .wishlist-empty h2 { font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 0.75rem; }
    .wishlist-empty p { color: var(--text-muted); }
    .wishlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem; }
    .wishlist-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      display: flex; gap: 1rem; padding: 1rem; align-items: center;
    }
    .wl-thumb { font-size: 3rem; flex-shrink: 0; width: 64px; text-align: center; }
    .wl-info { flex: 1; }
    .wl-title { font-weight: 600; margin-bottom: 0.2rem; }
    .wl-genre { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .wl-price { font-family: var(--font-display); font-size: 1rem; color: var(--accent); font-weight: 700; }
    .wl-actions { display: flex; flex-direction: column; gap: 0.4rem; }
    .btn-remove {
      padding: 0.3rem 0.6rem; border-radius: 5px; cursor: pointer; font-size: 0.72rem;
      background: rgba(255,45,120,0.1); color: var(--accent3); border: 1px solid rgba(255,45,120,0.3);
      font-weight: 600; transition: all 0.2s;
    }
    .btn-remove:hover { background: rgba(255,45,120,0.2); }

    /* CART / PAYMENT */
    .checkout-layout { display: grid; grid-template-columns: 1fr 380px; gap: 2rem; padding: 2rem; max-width: 1100px; margin: 0 auto; }
    @media (max-width: 768px) {
      .checkout-layout { grid-template-columns: 1fr; }
      .navbar { padding: 0 1rem; }
      .hero h1 { font-size: 2rem; }
      .featured-emoji { display: none; }
      .nav-links { display: none; }
      .stats-bar { gap: 2rem; }
      .featured-banner { padding: 2rem 1.5rem; }
    }
    .checkout-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem;
    }
    .checkout-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem; letter-spacing: 1px; color: var(--accent); }
    .cart-item { display: flex; gap: 1rem; align-items: center; padding: 0.85rem 0; border-bottom: 1px solid var(--border); }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-thumb { font-size: 2.5rem; flex-shrink: 0; }
    .cart-item-info { flex: 1; }
    .cart-item-title { font-weight: 600; margin-bottom: 0.2rem; }
    .cart-item-genre { font-size: 0.8rem; color: var(--text-muted); }
    .cart-item-price { font-family: var(--font-display); font-weight: 700; color: var(--accent); white-space: nowrap; }
    .btn-trash {
      background: none; border: none; cursor: pointer; font-size: 1rem;
      color: var(--text-muted); transition: color 0.2s; padding: 0.2rem;
    }
    .btn-trash:hover { color: var(--accent3); }
    .order-summary-row { display: flex; justify-content: space-between; padding: 0.5rem 0; font-size: 0.92rem; }
    .order-summary-row.total { border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 0.5rem; font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; color: var(--accent); }
    .payment-methods { display: flex; gap: 0.6rem; margin-bottom: 1.25rem; }
    .pay-method {

let toastSetter = null;
function showToast(msg, type='success') {
  if(toastSetter) toastSetter(prev => {
    const t = { id: Date.now(), msg, type };
    setTimeout(() => toastSetter(p => p.filter(x => x.id !== t.id)), 3000);
    return [...prev, t];
  });
}

function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => { toastSetter = setToasts; return () => { toastSetter = null; }; }, []);
  return React.createElement('div', { className:'toast-container' },

}

// ─── GAME CARD ─────────────────────────────────────────────────────────────
function GameCard({ game, cart, setCart, wishlist, setWishlist }) {
  const inWish = wishlist.some(w => w.id === game.id);
  const inCart = cart.some(c => c.id === game.id);

  const toggleWish = (e) => {
    e.stopPropagation();
    if(inWish) { setWishlist(prev => prev.filter(w => w.id !== game.id)); showToast('Removido da lista de desejo'); }
    else { setWishlist(prev => [...prev, game]); showToast(`${game.title} na lista de desejo! ❤️`); }
  };

  const badgeClass = game.badge === 'new' ? 'badge-new' : game.badge === 'sale' ? 'badge-sale' : 'badge-hot';
  const colors = ['#1a1030','#0a1a30','#0a2010','#201010','#1a1520','#102020','#202010','#101820'];

      React.createElement('div', { className:'game-genre' }, game.genre),
      React.createElement('div', { className:'game-footer' },
        React.createElement('div', null,
          React.createElement('div', { className:'game-rating' }, '★'.repeat(Math.round(game.rating)) + ` ${game.rating}`),
          React.createElement('div', { style:{ display:'flex', gap:'0.4rem', alignItems:'baseline' } },
            React.createElement('span', { className:'game-price' },
              game.price === 0 ? 'GRÁTIS' : `R$ ${game.price.toFixed(2)}`
            ),
            game.oldPrice && React.createElement('span', { className:'game-price-old' }, `R$ ${game.oldPrice.toFixed(2)}`)
          )
        ),
        React.createElement('button', { className:'btn-add', onClick: addToCart },
          game.price === 0 ? 'BAIXAR' : inCart ? '✓' : '+'
        )
      )
    )
  );
}

function HomePage({ games, setPage, cart, setCart, wishlist, setWishlist, setGlobalFilter }) {

          )
        ),
        React.createElement('img', { 
          src: 'https://image.api.playstation.com/vulcan/ap/rnd/202106/2214/UXDlNJfdtZJ080ONmH8q3CUX.png',
          alt: 'Death Stranding Destaque',

        )

        React.createElement('h2', { className:'section-title' }, React.createElement('span',null,'//'), ' CATEGORIAS')
      ),
      React.createElement('div', { className:'categories-grid' },
        CATEGORIES.map(c =>

// ─── LOGIN PAGE ─────────────────────────────────────────────────────────────
function LoginPage({ setPage, setUser }) {
  const [tab, setTab] = useState('login');
  const [form, setForm] = useState({ email:'', password:'', name:'', confirm:'' });
  const [loading, setLoading] = useState(false);

  const upd = (k,v) => setForm(p=>({...p,[k]:v}));

  const handleSubmit = async () => {
    if(!form.email || !form.password) { showToast('Preencha todos os campos!', 'error'); return; }
    if(tab==='register' && form.password !== form.confirm) { showToast('Senhas não coincidem!', 'error'); return; }
    if(tab==='register' && form.password.length < 6) { showToast('Senha deve ter pelo menos 6 caracteres!', 'error'); return; }
    setLoading(true);
    try {
      const endpoint = tab === 'login' ? '/api/auth/login' : '/api/auth/register';
      const body = tab === 'login'
        ? { email: form.email, password: form.password }
        : { name: form.name || form.email.split('@')[0], email: form.email, password: form.password };
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || 'Erro ao autenticar.', 'error'); return; }
      localStorage.setItem('cpg_token', data.token);
      setUser(data.user);
      showToast(tab==='login' ? '🎮 Bem-vindo de volta!' : '🚀 Conta criada com sucesso!');
      setPage('home');
    } catch(err) {
      showToast('Erro de conexão com o servidor.', 'error');
    } finally {
      setLoading(false);
    }
  };

  return React.createElement('div', { className:'auth-page' },
    React.createElement('div', { className:'auth-card' },
      React.createElement('div', { className:'auth-logo' },
        React.createElement('div', { className:'auth-logo-text' }, 'CloudPlay', React.createElement('span',null,'Games'))
      ),
      React.createElement('p', { className:'auth-subtitle' },
        tab==='login' ? 'Acesse sua conta e continue jogando' : 'Crie sua conta e junte-se a 2.4M de gamers'
      ),
      React.createElement('div', { className:'auth-tabs' },
        React.createElement('button', { className:`auth-tab ${tab==='login'?'active':''}`, onClick:()=>setTab('login') }, 'ENTRAR'),
        React.createElement('button', { className:`auth-tab ${tab==='register'?'active':''}`, onClick:()=>setTab('register') }, 'CADASTRAR')
      ),
      tab==='register' && React.createElement('div', { className:'form-group' },
        React.createElement('label', { className:'form-label' }, 'NOME DE USUÁRIO'),
        React.createElement('input', { className:'form-input', placeholder:'Seu nickname gamer', value:form.name, onChange:e=>upd('name',e.target.value) })
      ),
      React.createElement('div', { className:'form-group' },
        React.createElement('label', { className:'form-label' }, 'E-MAIL'),
        React.createElement('input', { className:'form-input', type:'email', placeholder:'seu@email.com', value:form.email, onChange:e=>upd('email',e.target.value) })
      ),
      React.createElement('div', { className:'form-group' },
        React.createElement('label', { className:'form-label' }, 'SENHA'),
        React.createElement('input', { className:'form-input', type:'password', placeholder:'••••••••', value:form.password, onChange:e=>upd('password',e.target.value) }),
        tab==='login' && React.createElement('div', { className:'forgot-link' }, 'Esqueci minha senha')
      ),
      tab==='register' && React.createElement('div', { className:'form-group' },
        React.createElement('label', { className:'form-label' }, 'CONFIRMAR SENHA'),
        React.createElement('input', { className:'form-input', type:'password', placeholder:'••••••••', value:form.confirm, onChange:e=>upd('confirm',e.target.value) })

      React.createElement('button', { className:'btn-full', onClick:handleSubmit, disabled:loading },
        loading ? '⏳ CARREGANDO...' : tab==='login' ? 'ENTRAR NA PLATAFORMA' : 'CRIAR CONTA'

      React.createElement('button', { className:'social-btn' }, '⬛ Entrar com Discord')
    )
  );

// ─── COMPRAR PAGE ──────────────────────────────────────────────────────────
function ComprarPage({ games, cart, setCart, wishlist, setWishlist, globalFilter, setGlobalFilter }) {
  const [search, setSearch] = useState('');
  const filters = ['Todos','RPG','Ação','FPS','Puzzle','Estratégia','Terror','Esporte','Ofertas','Grátis'];

  const filtered = games.filter(g => {
    const matchSearch = g.title.toLowerCase().includes(search.toLowerCase()) || g.genre.toLowerCase().includes(search.toLowerCase());
    if(globalFilter === 'Todos') return matchSearch;
    if(globalFilter === 'Ofertas') return matchSearch && g.oldPrice;
    if(globalFilter === 'Grátis') return matchSearch && g.price===0;
    return matchSearch && g.genre.toLowerCase().includes(globalFilter.toLowerCase());

// ─── APP ROOT ──────────────────────────────────────────────────────────────
const VALID_PAGES = ['home','comprar','login','lista-de-desejo','pagamento','confirmacao'];
function pageFromPath() {
  const slug = window.location.pathname.replace(/^\/+/, '') || 'home';
  return VALID_PAGES.includes(slug) ? slug : 'home';
}

function App() {

  const [page, setPage] = useState(pageFromPath());
  const [cart, setCart] = useState([]);
  const [wishlist, setWishlist] = useState([]);
  const [user, setUser] = useState(null);
  const [globalFilter, setGlobalFilter] = useState('Todos');

  const [games, setGames] = React.useState([]);


  React.useEffect(() => {
    fetch('/api/games')
      .then(res => res.json())
      .then(data => setGames(data))
      .catch(err => console.error("Erro ao buscar jogos do back-end:", err));
  }, []);

  // Restaura sessão se houver token salvo
  React.useEffect(() => {
    const token = localStorage.getItem('cpg_token');
    if (!token) return;
    fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(res => res.ok ? res.json() : Promise.reject())
      .then(data => setUser(data.user))
      .catch(() => localStorage.removeItem('cpg_token'));
  }, []);

  // Sincroniza URL <-> state (rota muda + botão voltar do navegador)
  useEffect(() => {
    const url = '/' + (page === 'home' ? '' : page);
    if (window.location.pathname !== url) {
      window.history.pushState({ page }, '', url);
    }
  }, [page]);

  useEffect(() => {
    const onPop = () => setPage(pageFromPath());
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);


  const renderPage = () => {
    switch(page) {
      case 'home': 
        return React.createElement(HomePage, { games, setPage, cart, setCart, wishlist, setWishlist, setGlobalFilter });
      case 'comprar': 
        return React.createElement(ComprarPage, { games, cart, setCart, wishlist, setWishlist, globalFilter, setGlobalFilter });
      case 'login': 
        return React.createElement(LoginPage, { setPage, setUser });
      case 'lista-de-desejo': 
        return React.createElement(WishlistPage, { wishlist, setWishlist, cart, setCart });
      case 'pagamento': 
        return React.createElement(PagamentoPage, { cart, setCart, setPage });
      case 'confirmacao': 
        return React.createElement(ConfirmacaoPage, { setPage, cart });
      default: 
        return React.createElement(HomePage, { games, setPage, cart, setCart, wishlist, setWishlist, setGlobalFilter });
    }
  };

  const showFooter = !['login','pagamento','confirmacao'].includes(page);

  // --- 5. RENDERIZAÇÃO FINAL ---
  return React.createElement(React.Fragment, null,
    React.createElement(Navbar, { page, setPage, cart, wishlist, user, setUser }),
    React.createElement('main', { className:'main' }, renderPage()),
    showFooter && React.createElement(Footer, { setPage }),
    React.createElement(ToastContainer)
  );
}

createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
